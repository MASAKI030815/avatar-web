<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>受付アバター</title>
  <style>
    :root { --brand: #1565c0; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0d1b2a; font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif; overflow: hidden; }

    .screen {
      position: absolute; inset: 0; display: none;
      flex-direction: column; align-items: center; justify-content: center;
      color: #fff; text-align: center; padding: 8vw;
    }
    /* 会議（アバター） */
    #meeting { position: absolute; inset: 0; display: none; }
    #meeting iframe { width: 100%; height: 100%; border: 0; }

    /* 承認/待機・ステータス共通の見た目 */
    #gate { background: radial-gradient(circle at 50% 32%, #1b4a80 0%, #0d1b2a 72%); }
    #status-screen { background: radial-gradient(circle at 50% 30%, #1b4a80 0%, #0d1b2a 70%); }

    .badge {
      display: inline-flex; align-items: center; gap: 0.5em;
      font-size: clamp(24px, 5.5vw, 60px); font-weight: 700;
      padding: 0.4em 1em; border-radius: 999px;
      background: rgba(255,255,255,0.08); border: 3px solid currentColor;
    }
    .badge .dot { width: 0.5em; height: 0.5em; border-radius: 50%; background: currentColor; }
    .msg { margin-top: 1.2em; font-size: clamp(16px, 3.2vw, 30px); line-height: 1.7; opacity: 0.92; max-width: 22em; }
    .spinner {
      margin-top: 1.4em; width: 42px; height: 42px; border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.25); border-top-color: #fff; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .devname { margin-top: 1.2em; font-size: clamp(12px, 2vw, 16px); opacity: 0.6; }
    #brandline { position: absolute; bottom: 4vh; font-size: clamp(12px, 2vw, 18px); opacity: 0.5; letter-spacing: 0.15em; }

    /* アバター非表示オーバーレイ */
    #hidden-overlay { z-index: 10; background: radial-gradient(circle at 50% 35%, #1b4a80 0%, #0d1b2a 75%); }
    #hidden-overlay .title { font-size: clamp(22px, 5vw, 48px); font-weight: 700; }

    /* ミュート中インジケータ */
    #mute-indicator {
      position: absolute; top: 16px; right: 16px; z-index: 20; display: none;
      align-items: center; gap: 8px; color: #fff;
      background: rgba(96,125,139,0.92); padding: 8px 16px; border-radius: 999px;
      font-size: clamp(12px, 2.2vw, 18px); font-weight: 700;
    }
  </style>
</head>
<body>
  <div id="meeting"></div>

  <!-- 承認/待機画面（Jitsiの参加ボタンは出さず、この独自画面から連携） -->
  <div id="gate" class="screen">
    <div class="badge" id="gate-badge"><span class="dot"></span><span id="gate-label">接続中…</span></div>
    <p class="msg" id="gate-msg">担当者の承認をお待ちください。</p>
    <div class="spinner" id="gate-spinner"></div>
    <div class="devname" id="gate-dev"></div>
    <div id="brandline">NETWORK SUPPORT DESK</div>
  </div>

  <!-- ステータス画面（承認済み・非対応時） -->
  <div id="status-screen" class="screen">
    <div class="badge" id="badge"><span class="dot"></span><span id="badge-label">—</span></div>
    <p class="msg" id="status-msg"></p>
    <div id="brandline">NETWORK SUPPORT DESK</div>
  </div>

  <!-- アバター非表示オーバーレイ -->
  <div id="hidden-overlay" class="screen">
    <div class="title">少々お待ちください</div>
    <p class="msg">担当者が対応の準備をしています</p>
  </div>

  <!-- ミュート中インジケータ -->
  <div id="mute-indicator">🔇 音声調整中</div>

  <!-- Jitsi IFrame API（参加/離脱をプログラム制御し、ネイティブの参加ボタンを出さない） -->
  <script src="https://8x8.vc/vpaas-magic-cookie-3a518f0ee8eb425ca08cd293ecd138da/external_api.js"></script>
  <!-- Firebase（同期・承認用） -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
  <script src="config.js"></script>
  <script src="status.js"></script>
  <script>
    const cfg = window.AVATAR_CONFIG;
    const meetingEl = document.getElementById("meeting");
    const gate = document.getElementById("gate");
    const gateBadge = document.getElementById("gate-badge");
    const gateLabel = document.getElementById("gate-label");
    const gateMsg = document.getElementById("gate-msg");
    const gateSpinner = document.getElementById("gate-spinner");
    const gateDev = document.getElementById("gate-dev");
    const statusScreen = document.getElementById("status-screen");
    const badge = document.getElementById("badge");
    const badgeLabel = document.getElementById("badge-label");
    const statusMsg = document.getElementById("status-msg");
    const hiddenOverlay = document.getElementById("hidden-overlay");
    const muteIndicator = document.getElementById("mute-indicator");

    const deviceId = window.getDeviceId();
    const defaultName = "端末-" + deviceId.replace(/^dev-/, "");
    let conn = null;   // 自端末の承認レコード
    let state = window.DEFAULT_STATE;
    let jitsiApi = null;

    gateDev.textContent = "端末ID: " + deviceId;

    // 接続を登録（新規はpending、永続許可済みは自動approved）
    window.ConnStore.registerSelf(deviceId, { name: defaultName, ua: (navigator.userAgent || "").slice(0, 140) });

    function pinOperator() {
      if (!jitsiApi) return;
      try {
        const parts = jitsiApi.getParticipantsInfo() || [];
        const op = parts.find((p) => p.displayName === cfg.jitsi.displayName);
        if (op) jitsiApi.setLargeVideoParticipant(op.participantId);
      } catch (e) {}
    }
    let meetingStarting = false;
    async function ensureMeeting() {
      if (jitsiApi || meetingStarting) return;
      meetingStarting = true;
      try {
        const jwt = await window.getJaasToken({ id: deviceId, name: (conn && conn.name) || defaultName });
        jitsiApi = new JitsiMeetExternalAPI("8x8.vc", {
          roomName: window.jaasRoomName(),
          jwt: jwt,
          parentNode: meetingEl,
          configOverwrite: {
            prejoinPageEnabled: false,
            prejoinConfig: { enabled: false },
            disableDeepLinking: true,
            disableInviteFunctions: true,
            startWithVideoMuted: false,
            filmstrip: { disabled: true },   // サムネイル非表示（監視参加を目立たせない）
          },
          interfaceConfigOverwrite: { TOOLBAR_BUTTONS: [] },
        });
        // 操作側（アバター）を常に主表示に固定
        jitsiApi.addEventListener("videoConferenceJoined", pinOperator);
        jitsiApi.addEventListener("participantJoined", pinOperator);
        jitsiApi.addEventListener("dominantSpeakerChanged", pinOperator);
      } catch (e) {
        jitsiApi = null;
      }
      meetingStarting = false;
    }
    function disposeMeeting() {
      if (jitsiApi) { try { jitsiApi.dispose(); } catch (e) {} jitsiApi = null; meetingEl.innerHTML = ""; }
    }

    function render() {
      const approved = conn && conn.approval === "approved";
      const rejected = conn && conn.approval === "rejected";
      const def = window.STATUS_DEFS[state.status] || window.STATUS_DEFS.away;

      // 未承認：承認/待機画面（会議には絶対つながない）
      if (!approved) {
        disposeMeeting();
        meetingEl.style.display = "none";
        statusScreen.style.display = "none";
        hiddenOverlay.style.display = "none";
        muteIndicator.style.display = "none";
        gate.style.display = "flex";
        if (rejected) {
          gateBadge.style.color = "#e57373";
          gateLabel.textContent = "接続が許可されていません";
          gateMsg.textContent = "お手数ですが担当者にお問い合わせください。";
          gateSpinner.style.display = "none";
        } else {
          gateBadge.style.color = "#64b5f6";
          gateLabel.textContent = "接続の承認待ち";
          gateMsg.textContent = "担当者の承認をお待ちください。";
          gateSpinner.style.display = "block";
        }
        return;
      }

      // 承認されたら即座に会議へ参加し、接続を維持する
      gate.style.display = "none";
      ensureMeeting();
      meetingEl.style.display = "block";

      if (def.showMeeting) {
        // 対応中：アバターを表示（非表示中はオーバーレイ）
        statusScreen.style.display = "none";
        hiddenOverlay.style.display = state.hidden ? "flex" : "none";
        muteIndicator.style.display = (state.muted && !state.hidden) ? "flex" : "none";
      } else {
        // 離席/他件/業務終了：接続は維持したまま、客先にはステータス画面を表示
        hiddenOverlay.style.display = "none";
        muteIndicator.style.display = "none";
        badge.style.color = def.color;
        badgeLabel.textContent = def.label;
        statusMsg.textContent = def.message;
        statusScreen.style.display = "flex";
      }
    }

    window.ConnStore.onSelf(deviceId, (rec) => { conn = rec; render(); });
    window.StatusStore.subscribe((s) => { state = s; render(); });
  </script>
</body>
</html>
